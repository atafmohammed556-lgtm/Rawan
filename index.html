<!DOCTYPE html>
<html>

<head>

<title>Rawan Records</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
text-align:center;
}

header{
padding:40px;
font-size:35px;
background:#020617;
}

.container{
width:90%;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
}

audio{
width:100%;
}

</style>

</head>

<body>

<header>
Rawan Audio Records
</header>

<div class="container">

<div class="card">
<p>Record 1</p>
<audio controls>
<source src="record1.mp3">
</audio>
</div>

<div class="card">
<p>Record 2</p>
<audio controls>
<source src="record2.mp3">
</audio>
</div>

<div class="card">
<p>Record 3</p>
<audio controls>
<source src="record3.mp3">
</audio>
</div>

</div>

</body>

</html>
